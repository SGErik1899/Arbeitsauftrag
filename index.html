<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbeitsauftrag</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
–blue: #003366;
–blue-mid: #0055a0;
–blue-light: #d6e4f5;
–blue-xlight: #edf4fb;
–accent: #e8a020;
–gray: #4a5568;
–gray-light: #e2e8f0;
–gray-xlight: #f7f9fc;
–red: #c0392b;
–green: #1a7a4a;
–border: #b0c4de;
–white: #ffffff;
–shadow: 0 2px 12px rgba(0,51,102,0.10);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: ‘IBM Plex Sans’, sans-serif;
background: #dce8f5;
min-height: 100vh;
padding: 24px 12px 48px;
color: var(–blue);
}

.page {
max-width: 860px;
margin: 0 auto;
background: var(–white);
border: 2px solid var(–blue);
box-shadow: var(–shadow);
border-radius: 4px;
overflow: hidden;
}

/* ── Header ── */
.header {
background: var(–blue);
color: var(–white);
padding: 18px 28px 14px;
display: flex;
align-items: center;
gap: 18px;
}
.header-icon {
width: 48px; height: 48px;
background: var(–accent);
border-radius: 6px;
display: flex; align-items: center; justify-content: center;
font-size: 26px; flex-shrink: 0;
}
.header-text h1 {
font-size: 1.35rem; font-weight: 700; letter-spacing: .5px;
}
.header-text p {
font-size: 0.78rem; opacity: .75; margin-top: 2px;
font-family: ‘IBM Plex Mono’, monospace;
}

/* ── Section headings ── */
.section-title {
background: var(–blue-mid);
color: var(–white);
font-size: 0.78rem;
font-weight: 700;
letter-spacing: 1.5px;
text-transform: uppercase;
padding: 7px 20px;
border-top: 1px solid var(–blue);
}

/* ── Grid layout ── */
.form-body { padding: 0 20px 16px; }

.grid {
display: grid;
gap: 10px 16px;
padding: 14px 0 6px;
}
.col-1 { grid-template-columns: 1fr; }
.col-2 { grid-template-columns: 1fr 1fr; }
.col-3 { grid-template-columns: 1fr 1fr 1fr; }
.col-1-2 { grid-template-columns: 1fr 2fr; }
.col-2-1 { grid-template-columns: 2fr 1fr; }

@media (max-width: 580px) {
.col-2, .col-3, .col-1-2, .col-2-1 { grid-template-columns: 1fr; }
}

.span-2 { grid-column: span 2; }
.span-3 { grid-column: span 3; }

/* ── Field ── */
.field { display: flex; flex-direction: column; gap: 4px; }

label {
font-size: 0.72rem;
font-weight: 600;
letter-spacing: .4px;
color: var(–gray);
text-transform: uppercase;
}

input[type=“text”],
input[type=“date”],
input[type=“number”],
select,
textarea {
width: 100%;
padding: 8px 11px;
border: 1.5px solid var(–border);
border-radius: 4px;
font-family: ‘IBM Plex Sans’, sans-serif;
font-size: 0.88rem;
color: var(–blue);
background: var(–gray-xlight);
transition: border-color .15s, box-shadow .15s, background .15s;
outline: none;
}
input:focus, select:focus, textarea:focus {
border-color: var(–blue-mid);
background: var(–white);
box-shadow: 0 0 0 3px rgba(0,85,160,.12);
}
textarea { resize: vertical; min-height: 80px; }

/* ── KM display ── */
.km-display {
padding: 8px 11px;
border: 1.5px solid var(–blue-light);
border-radius: 4px;
background: var(–blue-xlight);
font-family: ‘IBM Plex Mono’, monospace;
font-size: 0.9rem;
font-weight: 600;
color: var(–blue-mid);
min-height: 38px;
display: flex; align-items: center;
}
.km-display.empty { color: #a0aec0; font-weight: 400; font-family: ‘IBM Plex Sans’, sans-serif; font-size: 0.85rem; }

/* ── Priority ── */
.priority-group {
display: flex;
gap: 8px;
flex-wrap: wrap;
padding-top: 2px;
}
.priority-item {
flex: 1; min-width: 120px;
}
.priority-item input[type=“radio”] { display: none; }
.priority-item label {
display: flex;
align-items: flex-start;
gap: 8px;
padding: 9px 11px;
border: 1.5px solid var(–border);
border-radius: 5px;
cursor: pointer;
background: var(–gray-xlight);
transition: all .15s;
text-transform: none;
letter-spacing: 0;
font-size: 0.82rem;
font-weight: 500;
color: var(–gray);
line-height: 1.35;
}
.priority-item label:hover {
border-color: var(–blue-mid);
background: var(–blue-xlight);
color: var(–blue);
}
.priority-item input[type=“radio”]:checked + label {
border-color: var(–blue-mid);
background: var(–blue-light);
color: var(–blue);
font-weight: 600;
}
.prio-num {
display: inline-flex;
align-items: center; justify-content: center;
width: 22px; height: 22px;
border-radius: 50%;
font-size: 0.8rem; font-weight: 700;
flex-shrink: 0;
margin-top: 0;
background: var(–blue-light);
color: var(–blue-mid);
}
input[type=“radio”]:checked + label .prio-num {
background: var(–blue-mid);
color: var(–white);
}
.prio-1 .prio-num { background: #fde8e8; color: var(–red); }
input[type=“radio”]:checked + .prio-1 .prio-num { background: var(–red); color: var(–white); }
.prio-2 .prio-num { background: #fff3d6; color: #b06000; }
input[type=“radio”]:checked + .prio-2 .prio-num { background: var(–accent); color: var(–white); }
.prio-3 .prio-num { background: #d6f0e4; color: var(–green); }
input[type=“radio”]:checked + .prio-3 .prio-num { background: var(–green); color: var(–white); }
.prio-4 .prio-num { background: var(–blue-light); color: var(–blue-mid); }
input[type=“radio”]:checked + .prio-4 .prio-num { background: var(–blue-mid); color: var(–white); }

/* ── Divider ── */
.divider { border: none; border-top: 1px solid var(–gray-light); margin: 6px 0; }

/* ── Action buttons ── */
.actions {
display: flex; gap: 10px; justify-content: flex-end;
padding: 14px 20px 18px;
border-top: 1.5px solid var(–gray-light);
background: var(–gray-xlight);
}
button {
padding: 9px 22px;
border-radius: 4px;
font-family: ‘IBM Plex Sans’, sans-serif;
font-size: 0.88rem;
font-weight: 600;
cursor: pointer;
border: none;
transition: all .15s;
letter-spacing: .3px;
}
.btn-primary {
background: var(–blue);
color: var(–white);
box-shadow: 0 2px 6px rgba(0,51,102,.2);
}
.btn-primary:hover { background: var(–blue-mid); }
.btn-secondary {
background: var(–white);
color: var(–blue);
border: 1.5px solid var(–border);
}
.btn-secondary:hover { border-color: var(–blue-mid); background: var(–blue-xlight); }
.btn-danger { background: var(–white); color: var(–red); border: 1.5px solid #e8b0aa; }
.btn-danger:hover { background: #fde8e8; }

/* ── Print ── */
@media print {
body { background: white; padding: 0; }
.page { border: none; box-shadow: none; max-width: 100%; }
.actions { display: none; }
input, select, textarea { border-color: #ccc !important; background: white !important; }
.priority-item label { border-color: #ccc !important; }
input[type=“radio”]:checked + label { background: #eee !important; }
}

/* ── Toast ── */
.toast {
position: fixed; bottom: 28px; right: 28px;
background: var(–blue); color: var(–white);
padding: 12px 20px; border-radius: 6px;
font-size: 0.88rem; font-weight: 500;
box-shadow: 0 4px 16px rgba(0,0,0,.2);
opacity: 0; transform: translateY(12px);
transition: all .25s; pointer-events: none;
z-index: 100;
}
.toast.show { opacity: 1; transform: translateY(0); }
</style>

</head>

<script>
// ── Schleuse → KM Mapping ────────────────────────────────────────────────────
const schleuseKM = {
  "Lengfurt":       "Main-km 181,400",
  "Eichel":         "Main-km 162,960",
  "Faulbach":       "Main-km 151,350",
  "Freudenberg":    "Main-km 141,700",
  "Heubach":        "Main-km 131,100",
  "Klingenberg":    "Main-km 119,760",
  "Wallstadt":      "Main-km 109,800",
  "Obernau":        "Main-km 100,640",
  "Aschaffenburg":  "Main-km  95,560",
  "Kleinostheim":   "Main-km  86,060",
  "Krotzenburg":    "Main-km  82,450",
  "Hasloch":        "Main-km 176,600",
  "Erlenbach":      "Main-km 128,560",
  "Hanau":          "Main-km  68,220",
};

function updateKM() {
  const sel = document.getElementById('objekt').value;
  const disp = document.getElementById('kmDisplay');
  if (sel && schleuseKM[sel]) {
    disp.textContent = schleuseKM[sel];
    disp.classList.remove('empty');
  } else {
    disp.textContent = 'Wird nach Auswahl der Schleuse befüllt';
    disp.classList.add('empty');
  }
}

// ── Set today's date automatically ──────────────────────────────────────────
function setToday() {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');
  document.getElementById('feststellungAm').value = `${yyyy}-${mm}-${dd}`;
}

// ── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Save (localStorage) ──────────────────────────────────────────────────────
function saveForm() {
  const data = collectData();
  localStorage.setItem('arbeitsauftrag_data', JSON.stringify(data));
  showToast('✓ Formular gespeichert');
}

function collectData() {
  const prio = document.querySelector('input[name="prioritaet"]:checked');
  return {
    objekt: document.getElementById('objekt').value,
    km: document.getElementById('kmDisplay').textContent,
    kostenstelle: document.getElementById('kostenstelle').value,
    fahrzeug: document.getElementById('fahrzeug').value,
    orgeinheit: document.getElementById('orgeinheit').value,
    kostenart: document.getElementById('kostenart').value,
    kostentraeger: document.getElementById('kostentraeger').value,
    feststellungAm: document.getElementById('feststellungAm').value,
    langtext: document.getElementById('langtext').value,
    prioritaet: prio ? prio.value : '',
    schaden: document.getElementById('schaden').value,
    ausfall: document.getElementById('ausfall').value,
    befundKommentar: document.getElementById('befundKommentar').value,
    abzBhfWsa: document.getElementById('abzBhfWsa').value,
    prio2Select: document.getElementById('prio2Select').value,
    arbeitsvergabe: document.getElementById('arbeitsvergabe').value,
    unternehmer: document.getElementById('unternehmer').value,
    nichtsVeranlassen: document.getElementById('nichtsVeranlassen').value,
    durchfuehrung: document.getElementById('durchfuehrung').value,
    aufgestellt: document.getElementById('aufgestellt').value,
  };
}

function loadForm() {
  const raw = localStorage.getItem('arbeitsauftrag_data');
  if (!raw) return;
  try {
    const d = JSON.parse(raw);
    if (d.objekt) { document.getElementById('objekt').value = d.objekt; updateKM(); }
    ['kostenstelle','fahrzeug','orgeinheit','kostenart','kostentraeger',
     'feststellungAm','schaden','ausfall','befundKommentar',
     'abzBhfWsa','arbeitsvergabe','unternehmer','durchfuehrung','aufgestellt'].forEach(id => {
      if (d[id] !== undefined) document.getElementById(id).value = d[id];
    });
    if (d.langtext) document.getElementById('langtext').value = d.langtext;
    if (d.prio2Select) document.getElementById('prio2Select').value = d.prio2Select;
    if (d.nichtsVeranlassen) document.getElementById('nichtsVeranlassen').value = d.nichtsVeranlassen;
    if (d.prioritaet) {
      const r = document.querySelector(`input[name="prioritaet"][value="${d.prioritaet}"]`);
      if (r) r.checked = true;
    }
  } catch(e) {}
}

// ── Reset ────────────────────────────────────────────────────────────────────
function resetForm() {
  if (!confirm('Formular wirklich zurücksetzen?')) return;
  document.querySelectorAll('input[type="text"], input[type="date"], input[type="number"], select, textarea').forEach(el => {
    if (el.tagName === 'SELECT') el.selectedIndex = 0;
    else el.value = '';
  });
  document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
  const disp = document.getElementById('kmDisplay');
  disp.textContent = 'Wird nach Auswahl der Schleuse befüllt';
  disp.classList.add('empty');
  setToday();
  localStorage.removeItem('arbeitsauftrag_data');
  showToast('Formular zurückgesetzt');
}

// ── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  setToday();
  loadForm();
});
</script>
